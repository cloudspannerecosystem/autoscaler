steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: '/bin/bash'
    args:
      - -c
      - |
        for TEST_PROJECT_ID in $(gcloud alpha projects list --folder=${_FOLDER} --format="value(projectId)" --filter="createTime<-P1H")
          do
            echo Deleting $${TEST_PROJECT_ID}...
            gcloud projects delete $${TEST_PROJECT_ID} --quiet
          done

options:
  logging: 'CLOUD_LOGGING_ONLY'
